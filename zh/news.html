<h1>学术动态</h1>

<div class="news-grid" id="news-grid">

  <!-- 以后新增动态，复制一整块粘贴在这里【任意位置都可以】，会自动按 data-date 从新到旧排序 -->

  <div class="news-card" data-date="2027-07-07">
    <img src="../images/教育部重大.jpg" alt="动态图片" onclick="openLightbox(this)">
    <img src="../images/教育部重大2.jpg" alt="动态图片" onclick="openLightbox(this)">
    <p>2027年7月7日，张磊教授在清华大学召开的“教育部中国特色哲学社会科学研究重大专项——中国设计学自主知识体系构建研究”启动会上作重大项目汇报。</p>
  </div>

</main>

<!-- 灯箱弹窗结构 -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="">
</div>

<footer>

</footer>

<script>
// 自动按 data-date 从新到旧排序
const grid = document.getElementById('news-grid');
const cards = Array.from(grid.getElementsByClassName('news-card'));
cards.sort((a, b) => new Date(b.dataset.date) - new Date(a.dataset.date));
cards.forEach(card => grid.appendChild(card));

// 灯箱功能
function openLightbox(imgElement) {
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  lightboxImg.src = imgElement.src;
  lightbox.style.display = 'flex';
}
function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
}
</script>
